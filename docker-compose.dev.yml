services:
  api:
    build:
      context: .
      dockerfile: app/Dockerfile

    container_name: fastapi

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - redis

    volumes:
      - .:/app
      - sqlite_data:/app/data

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile

    container_name: telegram_bot

    env_file:
      - .env

    depends_on:
      - api
      - redis

    volumes:
      - .:/app

    command: >
      watchfiles
      --ignore-paths data/tasks.db
      --ignore-paths tasks.db
      --ignore-paths __pycache__
      --ignore-paths .git
      "python -m bot.main"

  redis:
    image: redis:7-alpine

    container_name: redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

volumes:
  redis_data:
  sqlite_data: